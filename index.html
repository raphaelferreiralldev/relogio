<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relógio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Georgia, serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #hora {
      font-size: 22vw;
      font-weight: bold;
      letter-spacing: -2px;
      line-height: 1;
    }

    #data {
      font-size: 5vw;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="hora"></div>
  <div id="data"></div>

  <script>
    const FUSO = 'America/Sao_Paulo';

    const diasSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

    function atualizar() {
      const agora = new Date();

      const partes = new Intl.DateTimeFormat('pt-BR', {
        timeZone: FUSO,
        hour: '2-digit', minute: '2-digit',
        weekday: 'long', day: 'numeric', month: 'short',
        hour12: false
      }).formatToParts(agora);

      const get = (tipo) => partes.find(p => p.type === tipo)?.value ?? '';

      document.getElementById('hora').textContent = `${get('hour')}:${get('minute')}`;

      const diaNome = get('weekday');
      const num = get('day');
      const mes = get('month').replace('.', '');
      document.getElementById('data').textContent = `${diaNome}, ${num} ${mes}`;
    }

    atualizar();
    setInterval(atualizar, 1000);
  </script>
</body>
</html>
