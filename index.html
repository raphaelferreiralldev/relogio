<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relógio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      color: #000;
      font-family: Georgia, serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #hora {
      font-size: 22vh;
      font-weight: bold;
      line-height: 1;
    }

    #data {
      font-size: 5vh;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="hora"></div>
  <div id="data"></div>

  <script>
    const diasSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

    function atualizar() {
      const utc = new Date().getTime();
      const brasilia = new Date(utc - 3 * 60 * 60 * 1000);

      const h = String(brasilia.getUTCHours()).padStart(2, '0');
      const m = String(brasilia.getUTCMinutes()).padStart(2, '0');
      document.getElementById('hora').textContent = h + ':' + m;

      const dia = diasSemana[brasilia.getUTCDay()];
      const num = brasilia.getUTCDate();
      const mes = meses[brasilia.getUTCMonth()];
      document.getElementById('data').textContent = dia + ', ' + num + ' ' + mes;
    }

    atualizar();
    setInterval(atualizar, 1000);
  </script>
</body>
</html>
